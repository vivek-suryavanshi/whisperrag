<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhisperRAG V2</title>
    <style>
        /* Reset default browser styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Main page — light white background, full height */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── LEFT SIDEBAR ── */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background-color: #f9f9f9;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 16px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        .logo-icon { font-size: 24px; }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: #7F77DD;
        }

        .url-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            color: #333;
        }

        .url-input:focus { border-color: #7F77DD; }

        .load-button {
            width: 100%;
            padding: 10px;
            background-color: #7F77DD;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .load-button:hover { background-color: #6a62c8; }
        .load-button:disabled { background-color: #b0aae8; cursor: not-allowed; }

        /* Active page indicator — hidden until URL is loaded */
        .page-indicator {
            display: none;
            background-color: #eef7ee;
            border: 1px solid #1D9E75;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            color: #1D9E75;
            word-break: break-word;
        }

        .page-indicator.visible { display: block; }

        .spacer { flex: 1; }

        .clear-button {
            width: 100%;
            padding: 10px;
            background-color: white;
            color: #999;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .clear-button:hover { background-color: #f5f5f5; color: #666; }

        /* ── RIGHT MAIN AREA ── */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .mode-banner {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }

        .mode-banner.web-rag-mode { background-color: #d4edda; color: #1D9E75; }
        .mode-banner.general-mode { background-color: #dce9f9; color: #4a7bbf; }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* User messages — right aligned, purple */
        .user-message {
            align-self: flex-end;
            background-color: #7F77DD;
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* AI messages — left aligned, light grey */
        .ai-message {
            align-self: flex-start;
            background-color: #F5F5F5;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .audio-player { margin-top: 8px; width: 100%; }

        .bottom-controls {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #f0f0f0;
        }

        .transcription-text {
            font-size: 14px;
            color: #666;
            text-align: center;
            min-height: 20px;
            font-style: italic;
        }

        /* Mic button — 64px circle */
        .mic-button {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: background-color 0.3s ease;
        }

        .mic-label { font-size: 12px; color: #999; }

        /* ── MIC BUTTON STATES ── */
        .mic-button.idle { background-color: #E0E0E0; color: #555; }

        .mic-button.recording {
            background-color: #E24B4A;
            color: white;
            animation: pulse 1s infinite;
        }

        .mic-button.thinking {
            background-color: #7F77DD;
            color: white;
            animation: spin 1s linear infinite;
            cursor: not-allowed;
        }

        .mic-button.speaking {
            background-color: #1D9E75;
            color: white;
            animation: wave 1s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes wave {
            0%   { transform: scale(1); }
            25%  { transform: scale(1.05); }
            50%  { transform: scale(1); }
            75%  { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- ── LEFT SIDEBAR ── -->
    <div class="sidebar">
        <div class="logo-area">
            <span class="logo-icon">🎙️</span>
            <span class="logo-text">WhisperRAG</span>
        </div>
        <input type="text" id="url-input" class="url-input" placeholder="https://example.com" />
        <button id="load-button" class="load-button" onclick="loadWebpage()">Load Page</button>
        <div id="page-indicator" class="page-indicator"></div>
        <div class="spacer"></div>
        <button class="clear-button" onclick="clearConversation()">Clear Conversation</button>
    </div>

    <!-- ── RIGHT MAIN AREA ── -->
    <div class="main-area">
        <div id="mode-banner" class="mode-banner general-mode">General mode</div>
        <div id="chat-history" class="chat-history"></div>
        <div class="bottom-controls">
            <div id="transcription-text" class="transcription-text"></div>
            <button id="mic-button" class="mic-button idle" onclick="handleMicClick()">🎤</button>
            <div id="mic-label" class="mic-label">Click to speak</div>
        </div>
    </div>

    <script>
        // ── APP STATE ──
        // These variables track the current state of the app

        // Current state of the mic button
        // Possible values: "idle", "recording", "thinking", "speaking"
        let micState = "idle";

        // The MediaRecorder object used to record audio from the mic
        let mediaRecorder = null;

        // Array to collect audio data chunks while recording
        let audioChunks = [];

        // The full conversation history sent to GPT for context
        // Each item is { role: "user" or "assistant", content: "..." }
        let conversationHistory = [];

        // The scraped webpage content stored after loading a URL
        let webpageContent = "";


        // This function updates the mic button appearance based on the current state
        function updateMicButton(state) {
            // Save the new state
            micState = state;

            // Get references to the button and label elements
            const micButton = document.getElementById("mic-button");
            const micLabel = document.getElementById("mic-label");

            // Remove all state classes first
            micButton.classList.remove("idle", "recording", "thinking", "speaking");

            if (state === "idle") {
                micButton.classList.add("idle");
                micButton.textContent = "🎤";
                micLabel.textContent = "Click to speak";
            }
            if (state === "recording") {
                micButton.classList.add("recording");
                micButton.textContent = "⏹";
                micLabel.textContent = "Recording... Click to stop";
            }
            if (state === "thinking") {
                micButton.classList.add("thinking");
                micButton.textContent = "⏳";
                micLabel.textContent = "Thinking...";
            }
            if (state === "speaking") {
                micButton.classList.add("speaking");
                micButton.textContent = "🔊";
                micLabel.textContent = "Speaking... Click to stop";
            }
        }

        // This function handles mic button clicks
        // If idle — start recording
        // If recording — stop recording
        // If speaking — stop audio and go back to idle
        // If thinking — do nothing (API call in flight, can't interrupt)
        function handleMicClick() {
            if (micState === "idle") { startRecording(); }
            else if (micState === "recording") { stopRecording(); }
            else if (micState === "speaking") { stopSpeaking(); }
            // Do nothing if thinking
        }

        // This function stops the audio playback when user clicks during speaking
        function stopSpeaking() {
            // Find the last audio player in the chat
            const allAudioPlayers = document.querySelectorAll(".audio-player");
            const lastAudioPlayer = allAudioPlayers[allAudioPlayers.length - 1];

            // Pause it and reset to the beginning
            if (lastAudioPlayer) {
                lastAudioPlayer.pause();
                lastAudioPlayer.currentTime = 0;
            }

            // Go back to idle so user can speak again
            updateMicButton("idle");
        }

        // This function starts recording audio from the user's microphone
        async function startRecording() {
            // Unlock audio autoplay by playing a silent audio immediately on the user gesture
            // Browsers block autoplay unless audio is triggered close to a real user click
            // Playing silence here registers audio permission for the whole session
            const silentAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA");
            silentAudio.play().catch(function() {});

            // Ask the browser for permission to use the microphone
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            // Create a MediaRecorder to capture the audio stream
            mediaRecorder = new MediaRecorder(stream);

            // Reset the audio chunks array before recording
            audioChunks = [];

            // Each time audio data is available, save it to the chunks array
            mediaRecorder.ondataavailable = function(event) {
                audioChunks.push(event.data);
            };

            // When recording stops, process the collected audio
            mediaRecorder.onstop = function() {
                processRecording();
            };

            // Start recording
            mediaRecorder.start();
            updateMicButton("recording");
        }

        // This function stops the recording
        function stopRecording() {
            // Stop the MediaRecorder — this triggers the onstop event above
            mediaRecorder.stop();

            // Stop all audio tracks to release the microphone
            mediaRecorder.stream.getTracks().forEach(function(track) {
                track.stop();
            });
        }

        // This function runs the full pipeline after recording stops
        // transcribe → chat → speak → play audio
        async function processRecording() {
            // Switch mic button to thinking state
            updateMicButton("thinking");

            // Combine all audio chunks into one blob (file)
            const audioBlob = new Blob(audioChunks, { type: "audio/webm" });

            // Create a FormData object to send the audio as a file upload
            const formData = new FormData();
            formData.append("audio_file", audioBlob, "recording.webm");

            // Step 1 — Send audio to Whisper for transcription
            const transcribeResponse = await fetch("/api/transcribe", {
                method: "POST",
                body: formData
            });
            const transcribeData = await transcribeResponse.json();
            const userText = transcribeData.text;

            // Show the transcribed text above the mic button
            document.getElementById("transcription-text").textContent = `"${userText}"`;

            // Add the user message to the chat history display
            addMessageToChat("user", userText);

            // Step 2 — Send the transcribed text to GPT for a reply
            const chatResponse = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_message: userText,
                    conversation_history: conversationHistory,
                    webpage_content: webpageContent
                })
            });
            const chatData = await chatResponse.json();
            const aiReply = chatData.reply;

            // Save this exchange to the conversation history for future context
            conversationHistory.push({ role: "user", content: userText });
            conversationHistory.push({ role: "assistant", content: aiReply });

            // Step 3 — Send the AI reply to TTS to get audio
            // Still in thinking state while we wait for TTS to respond
            const speakResponse = await fetch("/api/speak", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: aiReply })
            });

            // Convert the audio response to a blob
            const audioResponseBlob = await speakResponse.blob();

            // Create a URL for the audio blob so the browser can play it
            const audioUrl = URL.createObjectURL(audioResponseBlob);

            // Add the AI message with an embedded audio player to the chat
            addMessageToChat("ai", aiReply, audioUrl);

            // Find the last audio player in the chat and play it
            const allAudioPlayers = document.querySelectorAll(".audio-player");
            const lastAudioPlayer = allAudioPlayers[allAudioPlayers.length - 1];

            if (lastAudioPlayer) {
                // Only switch to speaking state right before audio actually plays
                updateMicButton("speaking");
                lastAudioPlayer.play();
                // When audio finishes, go back to idle state
                lastAudioPlayer.onended = function() {
                    updateMicButton("idle");
                };
            } else {
                // If no audio player found, go back to idle anyway
                updateMicButton("idle");
            }
        }

        // This function adds a message bubble to the chat history
        // role is either "user" or "ai"
        // audioUrl is optional — only passed for AI messages
        function addMessageToChat(role, text, audioUrl) {
            // Get the chat history container
            const chatHistory = document.getElementById("chat-history");

            // Create a new div for the message bubble
            const messageBubble = document.createElement("div");
            messageBubble.classList.add("message-bubble");

            // Add the correct class based on who sent the message
            if (role === "user") {
                messageBubble.classList.add("user-message");
            } else {
                messageBubble.classList.add("ai-message");
            }

            // Set the message text
            messageBubble.textContent = text;

            // If this is an AI message and we have audio, add an audio player
            if (role === "ai" && audioUrl) {
                const audioPlayer = document.createElement("audio");
                audioPlayer.classList.add("audio-player");
                audioPlayer.controls = true;
                audioPlayer.src = audioUrl;
                messageBubble.appendChild(audioPlayer);
            }

            // Add the bubble to the chat history
            chatHistory.appendChild(messageBubble);

            // Scroll to the bottom so the latest message is visible
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // This function loads a webpage from the URL input and stores its content
        async function loadWebpage() {
            // Get the URL from the input field
            const urlInput = document.getElementById("url-input");
            const url = urlInput.value.trim();

            // Do nothing if the input is empty
            if (!url) { return; }

            // Disable the load button while loading
            const loadButton = document.getElementById("load-button");
            loadButton.disabled = true;
            loadButton.textContent = "Loading...";

            // Send the URL to the scrape endpoint
            const response = await fetch("/api/scrape", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url: url })
            });
            const data = await response.json();

            // If the request failed, show an alert and re-enable the button
            if (!response.ok) {
                alert(`Error: ${data.detail}`);
                loadButton.disabled = false;
                loadButton.textContent = "Load Page";
                return;
            }

            // Fetch and store the webpage content for use in chat
            const contentResponse = await fetch("/api/scrape");
            const contentData = await contentResponse.json();
            webpageContent = contentData.webpage_content;

            // Show the page title in the sidebar indicator
            const pageIndicator = document.getElementById("page-indicator");
            pageIndicator.textContent = `📄 ${data.page_title}`;
            pageIndicator.classList.add("visible");

            // Switch the mode banner to Web RAG mode
            const modeBanner = document.getElementById("mode-banner");
            modeBanner.textContent = "Web RAG mode";
            modeBanner.classList.remove("general-mode");
            modeBanner.classList.add("web-rag-mode");

            // Re-enable the load button
            loadButton.disabled = false;
            loadButton.textContent = "Load Page";
        }

        // This function clears the conversation and resets all state
        async function clearConversation() {
            // Clear the stored webpage content on the server
            await fetch("/api/scrape", { method: "DELETE" });

            // Reset all local state variables
            conversationHistory = [];
            webpageContent = "";

            // Clear the chat history display
            document.getElementById("chat-history").innerHTML = "";

            // Clear the transcription text
            document.getElementById("transcription-text").textContent = "";

            // Hide the page indicator in the sidebar
            const pageIndicator = document.getElementById("page-indicator");
            pageIndicator.textContent = "";
            pageIndicator.classList.remove("visible");

            // Reset the mode banner back to general mode
            const modeBanner = document.getElementById("mode-banner");
            modeBanner.textContent = "General mode";
            modeBanner.classList.remove("web-rag-mode");
            modeBanner.classList.add("general-mode");

            // Reset the URL input field and mic button
            document.getElementById("url-input").value = "";
            updateMicButton("idle");
        }
    </script>

</body>
</html>
